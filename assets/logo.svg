<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#3e8bff"/>
    </linearGradient>
    <linearGradient id="txt" x1="0.05" y1="0.1" x2="0.95" y2="0.9">
      <stop offset="0%" stop-color="#c5b6ff"/>
      <stop offset="55%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#3e8bff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.28"/>
      <stop offset="70%" stop-color="#3e8bff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- фон -->
  <rect x="0" y="0" width="512" height="512" rx="100" ry="100" fill="#0a0c14"/>
  <rect x="0" y="0" width="512" height="512" rx="100" ry="100" fill="url(#glow)"/>

  <!-- внешнее слабое кольцо портала -->
  <circle cx="256" cy="230" r="160" fill="none" stroke="url(#grad)" stroke-width="4" stroke-opacity="0.35"/>
  <!-- активное кольцо -->
  <circle cx="256" cy="230" r="144" fill="none" stroke="url(#grad)" stroke-width="20" stroke-linecap="round"/>
  <!-- две светящиеся «точки-порты» на кольце -->
  <circle cx="112" cy="230" r="9" fill="#c5b6ff"/>
  <circle cx="400" cy="230" r="9" fill="#5aa8ff"/>

  <!-- монограмма PMG -->
  <text x="256" y="262" text-anchor="middle"
        font-family="Manrope, Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
        font-weight="800" font-size="112" letter-spacing="-6"
        fill="url(#txt)">PMG</text>

  <!-- подпись -->
  <text x="256" y="432" text-anchor="middle"
        font-family="Manrope, Inter, sans-serif"
        font-weight="800" font-size="30" letter-spacing="16"
        fill="#eef0fb" fill-opacity="0.95">ULTRA</text>
  <text x="256" y="468" text-anchor="middle"
        font-family="Manrope, Inter, sans-serif"
        font-weight="600" font-size="22" letter-spacing="10"
        fill="#8b92b6">GATEWAY</text>
</svg>
